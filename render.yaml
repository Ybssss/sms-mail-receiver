services:
  - type: web
    name: sms-mail-receiver
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: HERO_SMS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DATABASE_PATH
        value: /var/data/mail.db
      - key: MONGODB_URI
        sync: false
      - key: POLL_INTERVAL_MS
        value: "2000"
      - key: KEEPALIVE_INTERVAL_MS
        value: "600000"
      - key: BASE_USD_MYR
        value: "4"
      - key: BASE_GEMS_PER_MYR
        value: "10000"
      - key: BILLPLZ_API_KEY
        sync: false
      - key: BILLPLZ_COLLECTION_ID
        sync: false
      - key: BILLPLZ_X_SIGNATURE
        sync: false
      - key: TELEGRAM_PAYMENT_PROVIDER_TOKEN
        sync: false
      - key: MANUAL_TNG_PHONE
        sync: false
      - key: MANUAL_BANK_ACCOUNT
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: MANUAL_TNG_QR_URL
        sync: false
      - key: MANUAL_BANK_NAME
        value: "Hong Leong Bank"
      - key: MANUAL_BANK_HOLDER
        value: "TAN YUE BAO"
      - key: MANUAL_BANK_QR_URL
        sync: false
      - key: ALLOW_MANUAL_PAYMENTS
        value: "true"
      - key: ALLOW_BILLPLZ
        value: "true"
      - key: MYR_PER_STAR
        value: "0.052"
    disk:
      name: mail-data
      mountPath: /var/data
      sizeGB: 1
